workflows:
  android-apk:
    name: Android APK Build
    max_build_duration: 60
    environment:
      node: 20
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Android APK
        script: npx expo export --platform android
      - name: Build with EAS CLI
        script: npx eas build --platform android --profile preview --non-interactive --no-wait
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
